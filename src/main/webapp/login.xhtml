<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:p="http://primefaces.org/ui">

<h:head>
	<!--  <h:outputStylesheet library="css" name="style.css"></h:outputStylesheet> -->
	<meta name="viewport" content="width=device-width, initial-scale=1.0"></meta>
</h:head>

<h:body>
	<div class="card">

		<h:form id="formLogin">
			<p:growl id="growl" showDetail="true" />
			<p:panel id="pnlLogin" header="Inicio de Sesión" style="text-align:center">

				<p:graphicImage name="img/user.png" width="20%" />

				<p:panelGrid id="pnlGridLogin" columns="1"
					columnClasses="ui-g-12 ui-md-12,ui-g-12 ui-md-12" layout="grid"
					styleClass="ui-panelgrid-blank ui-fluid">
					<p:outputLabel value="Usuario" for="txtUsuario" style="float:left"></p:outputLabel>
					<p:inputText id="txtUsuario" value="#{loginController.usuario}"
						required="true" requiredMessage="El usuario es obligatorio"></p:inputText>

					<p:outputLabel value="Contraseña" for="txtPassword" style="float:left"></p:outputLabel>
					<p:password id="txtPassword" value="#{loginController.password}"
						required="true" requiredMessage="La contraseña es obligatorio"></p:password>

					<p:commandButton value="Ingresar"
						action="#{loginController.ingresar}" update="pnlGridLogin,growl">
					</p:commandButton>
				</p:panelGrid>
			</p:panel>
		</h:form>


	</div>
</h:body>
</html>
